<!DOCTYPE html>
<html>

<head>
  <title>Signup</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>
  <h2>Signup</h2>
  <form id="signupForm" autocomplete="off">

    <input type="text" id="name" placeholder="Name" required autocomplete="off"><br><br>

    <input type="email" id="email" placeholder="Email" required autocomplete="off"><br><br>

    
    <div class="password-box">
      <input type="password" id="password" placeholder="Password" required autocomplete="off"><br><br>
      <span class="eye" onclick="togglePassword()">👁️</span>
    </div>

    <button type="submit">Signup</button>

    <p>Already have an account? <a href="login.html">Login</a></p>
  </form>

  <script src="signup.js"></script>
</body>

</html>
