<!DOCTYPE html>
<html>

<head>
    <title>Login</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <h2>Login</h2>

    <form id="loginForm" autocomplete="off">

        <input type="email" id="email" name="user_email" placeholder="Email" required autocomplete="off"><br><br>

        <div class="password-box">
            <input type="password" id="password" placeholder="Password" required autocomplete="off"><br><br>
            <span class="eye" onclick="togglePassword()">👁️</span>
        </div>
        
        <button type="submit">Login</button>

        <p>Don't have an account? <a href="signup.html">Signup</a></p>
    </form>

    <script src="login.js"></script>
</body>

</html>
